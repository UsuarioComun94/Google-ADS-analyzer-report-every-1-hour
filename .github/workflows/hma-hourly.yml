name: HMA Hourly Demo

run-name: HMA ${{ github.event_name }} run-${{ github.run_number }}

on:
  # Fallback secundario.
  # El reloj principal exacto :00 / retry :05 debe venir desde cron-job.org usando workflow_dispatch.
  # GitHub schedule puede demorarse o perder ejecuciones, especialmente al inicio de cada hora.
  schedule:
    - cron: "0,5,17 * * * *"

  workflow_dispatch:
    inputs:
      client_number:
        description: "Cliente o nÃºmero de cliente"
        required: false
        default: "CLIENTE-DEMO-0001"
        type: string

      report_suffix:
        description: "Sufijo final del reporte"
        required: false
        default: "JPPQ"
        type: string

      report_timezone:
        description: "Zona horaria del reporte"
        required: false
        default: "America/Argentina/Cordoba"
        type: string

      data_source:
        description: "Fuente de datos solicitada"
        required: false
        default: "simulated"
        type: choice
        options:
          - simulated
          - google_ads
          - meta_ads
          - multi_platform

      cpa_threshold:
        description: "Umbral de CPA"
        required: false
        default: "25"
        type: string

      roas_threshold:
        description: "Umbral de ROAS"
        required: false
        default: "1.5"
        type: string

      ctr_threshold:
        description: "Umbral de CTR"
        required: false
        default: "1.0"
        type: string

      daily_budget_usd:
        description: "Presupuesto diario de referencia en USD"
        required: false
        default: "30000"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: hma-hourly-demo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-hma-demo:
    runs-on: ubuntu-latest

    env:
      DATA_SOURCE: ${{ inputs.data_source || vars.DATA_SOURCE || 'simulated' }}
      CLIENT_NUMBER: ${{ inputs.client_number || vars.CLIENT_NUMBER || 'CLIENTE-DEMO-0001' }}
      REPORT_SUFFIX: ${{ inputs.report_suffix || vars.REPORT_SUFFIX || 'JPPQ' }}
      REPORT_TIMEZONE: ${{ inputs.report_timezone || vars.REPORT_TIMEZONE || 'America/Argentina/Cordoba' }}
      CPA_THRESHOLD: ${{ inputs.cpa_threshold || vars.CPA_THRESHOLD || '25' }}
      ROAS_THRESHOLD: ${{ inputs.roas_threshold || vars.ROAS_THRESHOLD || '1.5' }}
      CTR_THRESHOLD: ${{ inputs.ctr_threshold || vars.CTR_THRESHOLD || '1.0' }}
      DAILY_BUDGET_USD: ${{ inputs.daily_budget_usd || vars.DAILY_BUDGET_USD || '30000' }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gate anti-duplicado horario
        id: hourly_gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW_FILE: hma-hourly.yml
          GITHUB_REF_NAME: ${{ github.ref_name }}
          CLIENT_NUMBER: ${{ env.CLIENT_NUMBER }}
          REPORT_SUFFIX: ${{ env.REPORT_SUFFIX }}
          REPORT_TIMEZONE: ${{ env.REPORT_TIMEZONE }}
        run: python scripts/hma_github_hourly_gate.py

      - name: Reporte de decisiÃ³n del gate
        if: always()
        run: |
          {
            echo "## HMA Scheduler Decision"
            echo ""
            echo "- Workflow run id: ${{ github.run_id }}"
            echo "- Event: ${{ github.event_name }}"
            echo "- should_run: ${{ steps.hourly_gate.outputs.should_run }}"
            echo "- target_hour: ${{ steps.hourly_gate.outputs.target_hour }}"
            echo "- target_hour_slug: ${{ steps.hourly_gate.outputs.target_hour_slug }}"
            echo "- artifact_name: ${{ steps.hourly_gate.outputs.artifact_name }}"
            echo "- reason: ${{ steps.hourly_gate.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Omitir ejecuciÃ³n duplicada
        if: steps.hourly_gate.outputs.should_run != 'true'
        run: |
          echo "Se omite generaciÃ³n de reporte."
          echo "Motivo: ${{ steps.hourly_gate.outputs.reason }}"

      - name: Instalar dependencias
        if: steps.hourly_gate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Mostrar configuraciÃ³n activa
        if: steps.hourly_gate.outputs.should_run == 'true'
        run: |
          echo "DATA_SOURCE=$DATA_SOURCE"
          echo "CLIENT_NUMBER=$CLIENT_NUMBER"
          echo "REPORT_SUFFIX=$REPORT_SUFFIX"
          echo "REPORT_TIMEZONE=$REPORT_TIMEZONE"
          echo "CPA_THRESHOLD=$CPA_THRESHOLD"
          echo "ROAS_THRESHOLD=$ROAS_THRESHOLD"
          echo "CTR_THRESHOLD=$CTR_THRESHOLD"
          echo "DAILY_BUDGET_USD=$DAILY_BUDGET_USD"
          echo "HMA_TARGET_HOUR=${{ steps.hourly_gate.outputs.target_hour }}"
          echo "HMA_TARGET_HOUR_SLUG=${{ steps.hourly_gate.outputs.target_hour_slug }}"

      - name: Ejecutar HMA demo
        id: hma_run
        if: steps.hourly_gate.outputs.should_run == 'true'
        continue-on-error: true
        env:
          HMA_TARGET_HOUR: ${{ steps.hourly_gate.outputs.target_hour }}
          HMA_TARGET_HOUR_SLUG: ${{ steps.hourly_gate.outputs.target_hour_slug }}
        run: python scripts/hma_demo.py

      - name: Verificar archivos generados
        id: verify_outputs
        if: steps.hourly_gate.outputs.should_run == 'true' && steps.hma_run.outcome == 'success'
        continue-on-error: true
        run: |
          pwd
          ls -la
          ls -la reports
          ls -la exports
          test -f reports/latest_hourly_report.md
          test -f reports/report_basename.txt
          test -f exports/latest_metrics.csv
          test -f exports/latest_summary.json
          test -f exports/connection_status.json

      - name: Reporte de falla de generaciÃ³n
        if: always() && steps.hourly_gate.outputs.should_run == 'true' && (steps.hma_run.outcome != 'success' || steps.verify_outputs.outcome != 'success')
        run: |
          mkdir -p diagnostics
          {
            echo "# HMA Generation Failure Report"
            echo ""
            echo "- Workflow run id: ${{ github.run_id }}"
            echo "- Event: ${{ github.event_name }}"
            echo "- Target hour: ${{ steps.hourly_gate.outputs.target_hour }}"
            echo "- Gate reason: ${{ steps.hourly_gate.outputs.reason }}"
            echo "- hma_demo outcome: ${{ steps.hma_run.outcome }}"
            echo "- verify outputs outcome: ${{ steps.verify_outputs.outcome }}"
            echo ""
            echo "## Meaning"
            echo "GitHub started the workflow, but the HMA report artifact was not produced successfully."
            echo ""
            echo "## Operational consequence"
            echo "No valid hourly artifact was produced for this target hour."
          } | tee diagnostics/hma_generation_failure_report.md

          {
            echo ""
            echo "## HMA Generation Failure"
            echo ""
            cat diagnostics/hma_generation_failure_report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Subir diagnÃ³stico de falla
        if: always() && steps.hourly_gate.outputs.should_run == 'true' && (steps.hma_run.outcome != 'success' || steps.verify_outputs.outcome != 'success')
        uses: actions/upload-artifact@v4
        with:
          name: HMA_FAILURE_${{ github.run_id }}
          path: diagnostics/hma_generation_failure_report.md
          if-no-files-found: error
          retention-days: 7

      - name: Fallar run si no se generÃ³ artifact vÃ¡lido
        if: steps.hourly_gate.outputs.should_run == 'true' && (steps.hma_run.outcome != 'success' || steps.verify_outputs.outcome != 'success')
        run: exit 1

      - name: Definir nombre determinÃ­stico del artifact
        if: steps.hourly_gate.outputs.should_run == 'true' && steps.hma_run.outcome == 'success' && steps.verify_outputs.outcome == 'success'
        run: |
          echo "REPORT_ARTIFACT_NAME=${{ steps.hourly_gate.outputs.artifact_name }}" >> "$GITHUB_ENV"

      - name: Guardar reportes y exports como artifact
        if: steps.hourly_gate.outputs.should_run == 'true' && steps.hma_run.outcome == 'success' && steps.verify_outputs.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPORT_ARTIFACT_NAME }}
          path: |
            reports/*.md
            exports/*.csv
            exports/*.json
          if-no-files-found: error
          retention-days: 7

      - name: Reporte de Ã©xito
        if: steps.hourly_gate.outputs.should_run == 'true' && steps.hma_run.outcome == 'success' && steps.verify_outputs.outcome == 'success'
        run: |
          {
            echo ""
            echo "## HMA Report Generated"
            echo ""
            echo "- Target hour: ${{ steps.hourly_gate.outputs.target_hour }}"
            echo "- Artifact: $REPORT_ARTIFACT_NAME"
            echo "- Result: valid hourly report artifact created."
          } >> "$GITHUB_STEP_SUMMARY"

