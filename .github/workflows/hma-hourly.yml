name: HMA Hourly Demo

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-hma-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar HMA demo
        run: python scripts/hma_demo.py

      - name: Verificar archivos generados
        run: |
          pwd
          ls -la
          ls -la reports
          test -f reports/latest_hourly_report.md

      - name: Guardar reportes como artifact
        uses: actions/upload-artifact@v4
        with:
          name: hma-hourly-reports
          path: reports/*.md
          if-no-files-found: error
          retention-days: 7