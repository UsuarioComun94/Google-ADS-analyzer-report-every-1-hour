name: HMA Hourly Demo

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-hma-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar HMA demo
        run: python scripts/hma_demo.py

      - name: Verificar archivos generados
        run: |
          pwd
          ls -la
          ls -la reports
          ls -la exports
          test -f reports/latest_hourly_report.md
          test -f reports/report_basename.txt
          test -f exports/latest_metrics.csv
          test -f exports/latest_summary.json

      - name: Definir nombre del artifact
        run: |
          echo "REPORT_ARTIFACT_NAME=$(cat reports/report_basename.txt)" >> "$GITHUB_ENV"

      - name: Guardar reportes y exports como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPORT_ARTIFACT_NAME }}
          path: |
            reports/*.md
            exports/*.csv
            exports/*.json
          if-no-files-found: error
          retention-days: 7