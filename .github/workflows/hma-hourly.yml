name: HMA Hourly Demo

on:

  workflow_dispatch:
    inputs:
      client_number:
        description: "Cliente o número de cliente"
        required: false
        default: "CLIENTE-DEMO-0001"
        type: string

      report_suffix:
        description: "Sufijo final del reporte"
        required: false
        default: "JPPQ"
        type: string

      report_timezone:
        description: "Zona horaria del reporte"
        required: false
        default: "America/Argentina/Cordoba"
        type: string

      data_source:
        description: "Fuente de datos solicitada"
        required: false
        default: "simulated"
        type: choice
        options:
          - simulated
          - google_ads
          - meta_ads
          - multi_platform

      cpa_threshold:
        description: "Umbral de CPA"
        required: false
        default: "25"
        type: string

      roas_threshold:
        description: "Umbral de ROAS"
        required: false
        default: "1.5"
        type: string

      ctr_threshold:
        description: "Umbral de CTR"
        required: false
        default: "1.0"
        type: string

      daily_budget_usd:
        description: "Presupuesto diario de referencia en USD"
        required: false
        default: "30000"
        type: string

jobs:
  run-hma-demo:
    runs-on: ubuntu-latest

    env:
      DATA_SOURCE: ${{ inputs.data_source || vars.DATA_SOURCE || 'simulated' }}
      CLIENT_NUMBER: ${{ inputs.client_number || vars.CLIENT_NUMBER || 'CLIENTE-DEMO-0001' }}
      REPORT_SUFFIX: ${{ inputs.report_suffix || vars.REPORT_SUFFIX || 'JPPQ' }}
      REPORT_TIMEZONE: ${{ inputs.report_timezone || vars.REPORT_TIMEZONE || 'America/Argentina/Cordoba' }}
      CPA_THRESHOLD: ${{ inputs.cpa_threshold || vars.CPA_THRESHOLD || '25' }}
      ROAS_THRESHOLD: ${{ inputs.roas_threshold || vars.ROAS_THRESHOLD || '1.5' }}
      CTR_THRESHOLD: ${{ inputs.ctr_threshold || vars.CTR_THRESHOLD || '1.0' }}
      DAILY_BUDGET_USD: ${{ inputs.daily_budget_usd || vars.DAILY_BUDGET_USD || '30000' }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Mostrar configuración activa
        run: |
          echo "DATA_SOURCE=$DATA_SOURCE"
          echo "CLIENT_NUMBER=$CLIENT_NUMBER"
          echo "REPORT_SUFFIX=$REPORT_SUFFIX"
          echo "REPORT_TIMEZONE=$REPORT_TIMEZONE"
          echo "CPA_THRESHOLD=$CPA_THRESHOLD"
          echo "ROAS_THRESHOLD=$ROAS_THRESHOLD"
          echo "CTR_THRESHOLD=$CTR_THRESHOLD"
          echo "DAILY_BUDGET_USD=$DAILY_BUDGET_USD"

      - name: Ejecutar HMA demo
        run: python scripts/hma_demo.py

      - name: Verificar archivos generados
        run: |
          pwd
          ls -la
          ls -la reports
          ls -la exports
          test -f reports/latest_hourly_report.md
          test -f reports/report_basename.txt
          test -f exports/latest_metrics.csv
          test -f exports/latest_summary.json
          test -f exports/connection_status.json

      - name: Definir nombre del artifact
        run: |
          echo "REPORT_ARTIFACT_NAME=$(cat reports/report_basename.txt)" >> "$GITHUB_ENV"

      - name: Guardar reportes y exports como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPORT_ARTIFACT_NAME }}
          path: |
            reports/*.md
            exports/*.csv
            exports/*.json
          if-no-files-found: error
          retention-days: 7
